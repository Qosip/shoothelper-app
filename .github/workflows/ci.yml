name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify no missing imports
        run: dart analyze --fatal-infos

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Check global coverage >= 80%
        run: |
          TOTAL=$(grep -c "^DA:" coverage/lcov.info)
          HIT=$(grep "^DA:" coverage/lcov.info | grep -cv ",0$")
          PCT=$((HIT * 100 / TOTAL))
          echo "Global coverage: $HIT/$TOTAL = $PCT%"
          if [ "$PCT" -lt 80 ]; then
            echo "FAIL: Global coverage $PCT% < 80%"
            exit 1
          fi

      - name: Validate data packs
        run: python tools/validate.py
